<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Binary to Text ✨</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #fde2e4, #e2ece9);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Poppins", sans-serif;
    }

    .card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        width: 420px;
        padding: 25px;
        border-radius: 25px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        text-align: center;
    }

    h1 {
        margin: 0;
        font-size: 26px;
        color: #6b7280;
    }

    p {
        font-size: 14px;
        color: #9ca3af;
        margin-bottom: 15px;
    }

    textarea {
        width: 100%;
        height: 90px;
        border-radius: 15px;
        border: none;
        padding: 12px;
        font-size: 14px;
        outline: none;
        resize: none;
        background: #f9fafb;
        color: #374151;
        box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
    }

    button {
        margin: 15px 0;
        padding: 12px 20px;
        border-radius: 20px;
        border: none;
        background: linear-gradient(135deg, #fbcfe8, #c7d2fe);
        font-size: 15px;
        font-weight: 600;
        color: #374151;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .footer {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="card">
    <h1>Binary → Text </h1>
    <p>Paste your binary code and decode </p>

    <textarea id="binaryInput" placeholder="01001000 01101001"></textarea>

    <button onclick="binaryToText()">Decode </button>

    <textarea id="textOutput" placeholder="Your decoded text appears here..." readonly></textarea>

    <div class="footer">copyright &copy; 2026</div>
</div>

<script>
    function binaryToDecimal(binary) {
        let decimal = 0;
        let power = binary.length - 1;

        for (let bit of binary) {
            decimal += Number(bit) * (2 ** power);
            power--;
        }

        return decimal;
    }

    function binaryToText() {
        let binaryString = document.getElementById("binaryInput").value.trim();
        let binaries = binaryString.split(" ");
        let result = "";

        for (let b of binaries) {
            if (b !== "") {
                let decimal = binaryToDecimal(b);
                result += String.fromCharCode(decimal);
            }
        }

        document.getElementById("textOutput").value = result;
    }
</script>

</body>
</html>
